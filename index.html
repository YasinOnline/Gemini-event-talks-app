
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks 2026</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        .search-container {
            margin: 20px 0;
            text-align: center;
        }
        .search-container input[type="text"] {
            padding: 10px;
            width: 70%;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .search-container button {
            padding: 10px 20px;
            border: none;
            background: #333;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
        .schedule {
            margin-top: 20px;
        }
        .schedule-item {
            background: #fff;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
        }
        .time-slot {
            width: 120px;
            font-weight: bold;
            color: #555;
            flex-shrink: 0;
        }
        .talk-details {
            flex-grow: 1;
        }
        .talk-details h3 {
            margin-top: 0;
            color: #333;
        }
        .talk-details .speakers {
            font-style: italic;
            color: #666;
            margin-bottom: 10px;
        }
        .talk-details .categories {
            margin-top: 10px;
        }
        .talk-details .category {
            display: inline-block;
            background: #e0e0e0;
            color: #333;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-right: 5px;
        }
        .break {
            background: #f0f0f0;
            color: #777;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tech Talks 2026</h1>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by category...">
            <button id="searchButton">Search</button>
        </div>
        <div id="schedule" class="schedule"></div>
    </div>

    <script>
        const talks = [
            {
                title: "The Future of JavaScript",
                speakers: ["Jane Doe"],
                categories: ["JavaScript", "WebDev", "Future"],
                description: "A deep dive into the next features of JavaScript and how they will shape web development."
            },
            {
                title: "Building Scalable APIs with GraphQL",
                speakers: ["John Smith", "Emily White"],
                categories: ["API", "GraphQL", "Backend"],
                description: "Learn how to build powerful and scalable APIs using GraphQL, with a focus on performance and security."
            },
            {
                title: "Frontend Frameworks: A Comparative Analysis",
                speakers: ["Chris Green"],
                categories: ["Frontend", "React", "Vue"],
                description: "An unbiased look at the most popular frontend frameworks, helping you choose the right one for your next project."
            },
            {
                title: "The Power of Serverless",
                speakers: ["Maria Garcia"],
                categories: ["Serverless", "Cloud", "Architecture"],
                description: "Discover the benefits of serverless architecture and how to deploy your first serverless application."
            },
            {
                title: "Machine Learning in the Browser",
                speakers: ["David Kim", "Sarah Chen"],
                categories: ["Machine Learning", "AI", "JavaScript"],
                description: "Explore the exciting world of running machine learning models directly in the browser with TensorFlow.js."
            },
            {
                title: "Cybersecurity in a Connected World",
                speakers: ["Michael Brown"],
                categories: ["Cybersecurity", "Security"],
                description: "A look at the current state of cybersecurity and best practices for securing your applications and data."
            }
        ];

        function generateSchedule() {
            const scheduleElement = document.getElementById('schedule');
            let currentTime = new Date();
            currentTime.setHours(10, 0, 0, 0); 
            
            let scheduleHTML = '';

            const formatTime = (date) => {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            };

            talks.forEach((talk, index) => {
                const startTime = new Date(currentTime);
                const endTime = new Date(startTime.getTime() + 60 * 60 * 1000);

                scheduleHTML += `
                    <div class="schedule-item" data-categories="${talk.categories.join(',').toLowerCase()}">
                        <div class="time-slot">${formatTime(startTime)} - ${formatTime(endTime)}</div>
                        <div class="talk-details">
                            <h3>${talk.title}</h3>
                            <div class="speakers">By: ${talk.speakers.join(', ')}</div>
                            <p>${talk.description}</p>
                            <div class="categories">
                                ${talk.categories.map(cat => `<span class="category">${cat}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;

                currentTime = new Date(endTime.getTime());

                if (index === 2) { // Lunch Break after 3rd talk
                     const lunchEndTime = new Date(currentTime.getTime() + 60 * 60 * 1000);
                     scheduleHTML += `
                        <div class="schedule-item break">
                            <div class="time-slot">${formatTime(currentTime)} - ${formatTime(lunchEndTime)}</div>
                            <div class="talk-details"><h3>Lunch Break</h3></div>
                        </div>
                     `;
                     currentTime = lunchEndTime;
                } else if (index < talks.length - 1) { // 10 min break between other talks
                    const breakEndTime = new Date(currentTime.getTime() + 10 * 60 * 1000);
                     scheduleHTML += `
                        <div class="schedule-item break">
                             <div class="time-slot">${formatTime(currentTime)} - ${formatTime(breakEndTime)}</div>
                            <div class="talk-details"><h4>Transition</h4></div>
                        </div>
                     `;
                    currentTime = breakEndTime;
                }
            });

            scheduleElement.innerHTML = scheduleHTML;
        }

        function filterTalks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const scheduleItems = document.querySelectorAll('.schedule-item');

            scheduleItems.forEach(item => {
                if (item.classList.contains('break')) return;

                const categories = item.dataset.categories;
                if (categories.includes(searchTerm)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            generateSchedule();
            document.getElementById('searchButton').addEventListener('click', filterTalks);
            document.getElementById('searchInput').addEventListener('keyup', (event) => {
                if (event.key === 'Enter') {
                    filterTalks();
                }
            });
        });

    </script>

</body>
</html>
